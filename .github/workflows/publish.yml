name: Publish package

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@admin-navanta'

      - name: Verify tag matches package version
        run: |
          PKG_VERSION="$(node -p "require('./packages/design-system/package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME (=$TAG_VERSION) does not match package.json version $PKG_VERSION"
            exit 1
          fi

      # Using `npm install` (not `npm ci`) so missing platform-specific
      # optional native bindings (e.g. rolldown linux-x64) are resolved
      # when the lockfile was generated on macOS. See npm/cli#4828.
      - run: npm install --include=optional --no-audit --no-fund

      - run: npm run build -w packages/design-system

      - run: npm publish -w packages/design-system --access restricted
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
